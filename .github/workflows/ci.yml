name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  web-build:
    name: Build web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 7

  server-check:
    name: Check server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: reach_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/reach_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/reach_ci
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/reach_ci
      TEST_DIRECT_URL: postgresql://postgres:postgres@localhost:5432/reach_ci
      JWT_SECRET: ci-test-jwt-secret
      BCRYPT_ROUNDS: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Check migrations are up to date
        run: npx prisma migrate diff --from-migrations ./prisma/migrations --to-schema-datamodel ./prisma/schema.prisma --shadow-database-url "$DATABASE_URL" --exit-code || (echo "Unapplied schema changes detected — run prisma migrate dev" && exit 1)

      - name: Write test env file
        run: |
          echo "TEST_DATABASE_URL=$TEST_DATABASE_URL" >> .env.test
          echo "TEST_DIRECT_URL=$TEST_DIRECT_URL" >> .env.test
          echo "JWT_SECRET=$JWT_SECRET" >> .env.test
          echo "BCRYPT_ROUNDS=$BCRYPT_ROUNDS" >> .env.test

      - name: Run server tests
        run: node --env-file=.env.test --test --test-concurrency=1 auth.test.js checkQuota.test.js email.test.js analytics.test.js observability.test.js

  extension-package:
    name: Package extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip extension
        run: |
          cd extension
          zip -r ../reach-extension.zip . -x "*.DS_Store" -x "__MACOSX/*"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: reach-extension
          path: reach-extension.zip
          retention-days: 7

  release:
    name: Create release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [web-build, server-check, extension-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download extension artifact
        uses: actions/download-artifact@v4
        with:
          name: reach-extension

      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist

      - name: Zip web dist
        run: zip -r reach-web.zip web-dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            reach-extension.zip
            reach-web.zip
          generate_release_notes: true
