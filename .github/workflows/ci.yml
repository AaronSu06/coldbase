name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web-build:
    name: Build web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 7

  extension-package:
    name: Package extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip extension
        run: |
          cd extension
          zip -r ../reach-extension.zip . -x "*.DS_Store"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: reach-extension
          path: reach-extension.zip
          retention-days: 7
