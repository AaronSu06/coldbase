<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reach</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #0a0a0a;
      background: #ffffff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      background: #f9fafb;
      border-bottom: 1px solid #e5e7eb;
    }
    .header img {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      flex-shrink: 0;
    }
    .header-text {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #0a0a0a;
      letter-spacing: -0.02em;
    }
    .header .subtitle {
      font-size: 11px;
      color: #9ca3af;
      font-weight: 400;
    }

    .stats {
      display: flex;
      padding: 20px 16px;
      border-bottom: 1px solid #f3f4f6;
    }
    .stat {
      flex: 1;
      text-align: center;
    }
    .stat + .stat {
      border-left: 1px solid #f3f4f6;
    }
    .stat-value {
      font-family: ui-monospace, 'Cascadia Code', monospace;
      font-size: 28px;
      font-weight: 600;
      color: #4f46e5;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .stat-label {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      margin-top: 6px;
    }

    .footer {
      padding: 14px 16px;
      border-bottom: 1px solid #f3f4f6;
    }
    .open-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      background: #4f46e5;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: background 150ms ease;
    }
    .open-btn:hover { background: #4338ca; }
    .open-btn svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .settings {
      padding: 14px 16px;
    }
    .settings-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9ca3af;
      margin-bottom: 10px;
    }
    .field {
      margin-bottom: 8px;
    }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }
    .field input {
      width: 100%;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
      color: #0a0a0a;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 6px 8px;
      outline: none;
      transition: border-color 120ms ease;
    }
    .field input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99,102,241,0.12);
    }
    .save-btn {
      width: 100%;
      background: #f3f4f6;
      color: #374151;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 7px 14px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 120ms ease;
      margin-top: 4px;
    }
    .save-btn:hover { background: #e5e7eb; }
    .save-status {
      font-size: 11px;
      color: #16a34a;
      text-align: center;
      margin-top: 6px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="Reach.png" alt="Reach" />
    <div class="header-text">
      <h1>Reach</h1>
      <span class="subtitle">outreach tracker</span>
    </div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="stat-sent">—</div>
      <div class="stat-label">Sent</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-replied">—</div>
      <div class="stat-label">Replied</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-rate">—</div>
      <div class="stat-label">Reply Rate</div>
    </div>
  </div>
  <div class="footer">
    <button class="open-btn" id="open-btn">
      Open Dashboard
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 8h10M9 4l4 4-4 4"/>
      </svg>
    </button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
